name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        package:
          - core
          - catalog-management
          - reservation-management
          - billing-management
          - notification-management
    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Auth Dev Hub
        run: echo "${{ secrets.DEV_HUB_SFDX_AUTH_URL }}" | sf org login sfdx-url --sfdx-url-stdin --alias dev-hub --set-default-dev-hub

      - name: Auth QA
        run: echo "${{ secrets.QA_SFDX_AUTH_URL }}" | sf org login sfdx-url --sfdx-url-stdin --alias qa

      - name: Auth Production
        run: echo "${{ secrets.PRODUCTION_SFDX_AUTH_URL }}" | sf org login sfdx-url --sfdx-url-stdin --alias production

      - name: Create package version
        id: create
        run: |
          PACKAGE_CREATE_VERSION=$(sf package version create --package "${{ matrix.package }}" --installation-key-bypass --code-coverage --wait 30 --json | jq -re '.result.SubscriberPackageVersionId')
          echo "version=$PACKAGE_CREATE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install in QA
        run: sf package install --package "${{ steps.create.outputs.version }}" --target-org qa --wait 20 --publish-wait 10

      - name: Promote
        run: sf package version promote --package "${{ steps.create.outputs.version }}" --no-prompt

      - name: Install in Production
        run: sf package install --package "${{ steps.create.outputs.version }}" --target-org production --wait 20 --publish-wait 10
