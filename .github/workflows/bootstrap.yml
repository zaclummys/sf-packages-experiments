name: Bootstrap

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Auth Dev Hub
        run: echo "${{ secrets.DEV_HUB_SFDX_AUTH_URL }}" | sf org login sfdx-url --alias dev-hub --set-default-dev-hub --sfdx-url-stdin

      - name: Create Packages
        run: |
          packages="
            core
            catalog-management
            reservation-management
            billing-management
            notification-management
          "
          
          for pkg in $packages; do
            sf package create --name "$pkg" --package-type Unlocked --path "packages/$pkg"
          done

      - name: Show sfdx-project.json
        run: cat sfdx-project.json
